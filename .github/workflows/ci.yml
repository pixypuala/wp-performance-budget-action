name: CI

# Typechecks and runs the accessibility/behaviour test suite on every change.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} — typecheck + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack (provides pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install dependencies
        # Lockfile is not committed (see .gitignore); resolve fresh.
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Tests (vitest + jsdom + axe)
        run: pnpm test
      - name: Build and smoke-test the CLI
        run: |
          pnpm build
          node dist/cli.js fixtures/metrics.json fixtures/budget.json && exit 1 || test $? -eq 1
